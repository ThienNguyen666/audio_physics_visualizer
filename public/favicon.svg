<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3742fa;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#neonGrad)" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#3742fa" stroke-width="1" stroke-dasharray="2 2" opacity="0.3"/>

  <path d="M 20 50 Q 35 15 50 50 T 80 50" fill="none" stroke="url(#neonGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 20 50 Q 35 85 50 50 T 80 50" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <circle cx="50" cy="50" r="6" fill="#ffffff" filter="url(#glow)"/>

  <circle cx="35" cy="30" r="3" fill="#00ffcc" filter="url(#glow)"/>
  <circle cx="65" cy="70" r="2.5" fill="#3742fa"/>
  <circle cx="72" cy="38" r="2" fill="#ff4757" filter="url(#glow)"/> </svg>
